name: Desktop artifacts

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Download Godot and Web export templates
        run: |
          curl -L --fail --retry 3 "https://github.com/godotengine/godot/releases/download/4.6.3-stable/Godot_v4.6.3-stable_linux.x86_64.zip" -o godot.zip
          curl -L --fail --retry 3 "https://github.com/godotengine/godot/releases/download/4.6.3-stable/Godot_v4.6.3-stable_export_templates.tpz" -o templates.tpz
          unzip -q godot.zip -d godot-bin
          mkdir -p "$HOME/.local/share/godot/export_templates/4.6.3.stable"
          unzip -q templates.tpz -d templates
          cp templates/templates/web_* "$HOME/.local/share/godot/export_templates/4.6.3.stable/"
          chmod +x godot-bin/Godot_v4.6.3-stable_linux.x86_64
      - name: Smoke test Web export
        run: ./scripts/smoke_web_export.sh "$PWD/godot-bin/Godot_v4.6.3-stable_linux.x86_64"
      - uses: actions/upload-artifact@v4
        with:
          name: godot-wtransport-web-demo
          path: dist/web
          if-no-files-found: error

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos
            godot_asset: Godot_v4.6.3-stable_macos.universal.zip
          - os: ubuntu-24.04
            platform: linux
            godot_asset: Godot_v4.6.3-stable_linux.x86_64.zip
          - os: windows-2025
            platform: windows
            godot_asset: Godot_v4.6.3-stable_win64.exe.zip
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
          targets: aarch64-apple-darwin,x86_64-apple-darwin,x86_64-unknown-linux-gnu,x86_64-pc-windows-msvc
      - uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'
      - name: Configure MSVC linker for Cargo
        if: runner.os == 'Windows'
        run: |
          msvc_tools="$(cygpath -u "$VCToolsInstallDir")"
          echo "CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER=$msvc_tools/bin/Hostx64/x64/link.exe" >> "$GITHUB_ENV"
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build libfontconfig1 libx11-6 libxcursor1 libxinerama1 libxrandr2 libxi6 libgl1
      - name: Install Windows packaging dependencies
        if: runner.os == 'Windows'
        run: choco install zip --yes --no-progress
      - name: Check out pinned godot-cpp
        run: git clone --depth 1 https://github.com/godotengine/godot-cpp.git godot-cpp && git -C godot-cpp fetch --depth 1 origin e83fd0904c13356ed1d4c3d09f8bb9132bdc6b77 && git -C godot-cpp checkout --detach e83fd0904c13356ed1d4c3d09f8bb9132bdc6b77
      - name: Build desktop extension
        env:
          GWT_GODOT_CPP_SOURCE: ${{ github.workspace }}/godot-cpp
        run: |
          set +e
          ./scripts/build_desktop.sh 2>&1 | tee desktop-build.log
          status=${PIPESTATUS[0]}
          set -e
          if [[ "$status" -ne 0 ]]; then
            message="$(tail -n 30 desktop-build.log | tr '\n' ' ')"
            echo "::error title=Desktop build failed::$message"
            exit "$status"
          fi
      - name: Build development server
        run: cargo build --release --target ${{ runner.os == 'macOS' && 'aarch64-apple-darwin' || runner.os == 'Windows' && 'x86_64-pc-windows-msvc' || 'x86_64-unknown-linux-gnu' }} -p godot-wtransport-dev-server
      - name: Build and run repeated C ABI integration
        if: runner.os == 'macOS'
        run: |
          cc -arch arm64 -I rust/ffi/include tests/ffi/integration.c \
            target/aarch64-apple-darwin/release/libgodot_wtransport_ffi.a \
            -framework Security -framework CoreFoundation \
            -framework SystemConfiguration -lresolv -o /tmp/gwt-ffi-integration
          ./scripts/smoke_ffi_integration.sh /tmp/gwt-ffi-integration \
            "$PWD/target/aarch64-apple-darwin/release/godot-wtransport-dev-server"
      - name: Download Godot
        run: curl -L --fail --retry 3 "https://github.com/godotengine/godot/releases/download/4.6.3-stable/${{ matrix.godot_asset }}" -o godot.zip && unzip -q godot.zip -d godot-bin
      - name: Locate Godot
        id: godot
        run: |
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            echo "path=$PWD/godot-bin/Godot.app/Contents/MacOS/Godot" >> "$GITHUB_OUTPUT"
          elif [[ "${{ runner.os }}" == "Windows" ]]; then
            echo "path=$(find "$PWD/godot-bin" -name 'Godot*.exe' -type f | head -1)" >> "$GITHUB_OUTPUT"
          else
            path="$(find "$PWD/godot-bin" -name 'Godot*' -type f | head -1)"
            chmod +x "$path"
            echo "path=$path" >> "$GITHUB_OUTPUT"
          fi
      - name: Smoke test release extension
        run: ./scripts/smoke_release.sh "${{ steps.godot.outputs.path }}" "${{ matrix.platform }}"
      - name: Smoke test native streams
        run: |
          server="$PWD/target/${{ runner.os == 'macOS' && 'aarch64-apple-darwin' || runner.os == 'Windows' && 'x86_64-pc-windows-msvc' || 'x86_64-unknown-linux-gnu' }}/release/godot-wtransport-dev-server"
          if [[ "${{ runner.os }}" == "Windows" ]]; then server="$server.exe"; fi
          ./scripts/smoke_streams.sh "${{ steps.godot.outputs.path }}" "$server"
      - name: Split symbols and package
        run: ./scripts/package_desktop_artifacts.sh "${{ matrix.platform }}" 0.1.0-dev
      - uses: actions/upload-artifact@v4
        with:
          name: godot-wtransport-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error

  addon:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: godot-wtransport-*
          path: platform-artifacts
      - name: Merge platform addons
        run: |
          mkdir -p combined
          for archive in platform-artifacts/*/godot-wtransport-0.1.0-dev.zip; do
            unzip -q -o "$archive" -d combined
          done
          find combined -exec touch -t 198001010000 {} +
          (cd combined && zip -X -r ../godot-wtransport-0.1.0-dev-all-desktop.zip addons)
          shasum -a 256 godot-wtransport-0.1.0-dev-all-desktop.zip > godot-wtransport-0.1.0-dev-all-desktop.zip.sha256
          unzip -t godot-wtransport-0.1.0-dev-all-desktop.zip
      - uses: actions/upload-artifact@v4
        with:
          name: godot-wtransport-addon-all-desktop
          path: godot-wtransport-0.1.0-dev-all-desktop.zip*
          if-no-files-found: error
