name: Security and licenses

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read

jobs:
  dependency-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.0
      - name: Install policy tools
        run: cargo install --locked cargo-audit cargo-deny
      - name: Check advisories
        run: cargo audit --deny warnings
      - name: Check licenses and sources
        run: cargo deny check licenses bans sources
      - name: Check C ABI header drift
        run: cargo run --locked -p xtask -- check-header
